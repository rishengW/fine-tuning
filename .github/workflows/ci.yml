name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      # We deliberately skip the heavy ML dependencies (torch / transformers /
      # peft) in CI - those need GPU runners to test meaningfully. Instead we
      # install only the lightweight dev tooling and run lint + the small
      # test suite that exercises the pure-python helpers.
      - name: Install dev tooling
        run: |
          python -m pip install --upgrade pip
          pip install ruff==0.7.4 mypy==1.13.0 pytest==8.3.3 pydantic==2.9.2 pyyaml==6.0.2

      - name: Ruff lint
        run: ruff check src

      - name: Run tests
        run: pytest tests/unit -q
